# cdd-manifest.toml
#
# Single source of truth mapping canonical authority sources to generated
# Claude/Codex runtime adapter outputs. Read by scripts/sync_adapters.py
# (generation + freshness check) and scripts/workflow_consistency.py
# (boundary + freshness contracts).
#
# Canonical roots are hand-authored. Every output path below is generated by
# `python scripts/sync_adapters.py --write` and must never be hand-edited.

version = 2

# ---------------------------------------------------------------------------
# Runtimes
# ---------------------------------------------------------------------------

[runtimes.claude]
label = "Claude Code"

[runtimes.codex]
label = "Codex"

# ---------------------------------------------------------------------------
# Canonical sources
# ---------------------------------------------------------------------------

[sources.skills]
root = "skills"
include = "*/SKILL.md"
expected_count = 74

[sources.agents]
root = "agents"
include = "*.md"
expected_count = 53

[sources.hooks]
root = "hooks"
include = "*.sh"
expected_count = 12

[sources.root-instructions]
file = "INSTRUCTIONS.md"
expected_count = 1

# Rules: Claude-only generated projection. Codex has no path-glob enforcement
# equivalent; it consults these canonical files through root guidance instead.
# Codex's native .codex/rules/*.rules command-approval namespace is unrelated and
# never generator-owned.
[sources.rules]
root = "rules"
include = "*.md"
expected_count = 16
targets = ["claude"]

# Nested instructions: one single-file source per directory that has runtime-
# neutral canonical guidance, generating a sibling CLAUDE.md + AGENTS.md pair.
# Claude and Codex each discover their own file per directory.
[sources.nested-src]
file = "src/INSTRUCTIONS.md"
expected_count = 1
targets = ["claude", "codex"]

[sources.nested-design]
file = "design/INSTRUCTIONS.md"
expected_count = 1
targets = ["claude", "codex"]

[sources.nested-docs]
file = "docs/INSTRUCTIONS.md"
expected_count = 1
targets = ["claude", "codex"]

# ---------------------------------------------------------------------------
# Transforms
# ---------------------------------------------------------------------------

# `runtime_substitute` is manifest-configured and applied to Codex outputs.
# Order is load-bearing: file/product-specific phrases precede the bare
# `CLAUDE`/`Claude` replacements so `CLAUDE.md` and `Claude Code` are handled
# before the bare-token rules.
[transforms.runtime_substitute]
replacements = [
  [".claude/skills/", ".agents/skills/"],
  [".claude/agents/", ".codex/agents/"],
  ["Claude Code", "Codex"],
  ["CLAUDE.md", "AGENTS.md"],
  ["CLAUDE", "Codex"],
  ["Claude", "Codex"],
]
# Any surviving literal in a Codex output is an ERROR. Both POSIX and Windows
# adapter-path forms are forbidden so a Windows-form path is rejected, not
# guessed. Add a narrow, documented allowlist entry if a legitimate future
# reference is required.
forbidden_literals = [".claude/", ".claude\\", "CLAUDE", "Claude"]

# `agent_md_to_toml` is a built-in, configuration-free transform registered by
# the generator (not declared here).

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------

# Skills: Claude copy verbatim; Codex copy with runtime substitution.
[[outputs]]
source = "skills"
runtime = "claude"
dest_root = ".claude/skills"
dest_pattern = "{relative}"
transforms = []
owns_tree = true

[[outputs]]
source = "skills"
runtime = "codex"
dest_root = ".agents/skills"
dest_pattern = "{relative}"
transforms = ["runtime_substitute"]
owns_tree = true

# Agents: Claude Markdown verbatim; Codex Markdown -> TOML (drops operational
# frontmatter: tools, model, maxTurns, memory, skills, disallowedTools,
# isolation; unknown fields block generation).
[[outputs]]
source = "agents"
runtime = "claude"
dest_root = ".claude/agents"
dest_pattern = "{name}"
transforms = []
owns_tree = true

[[outputs]]
source = "agents"
runtime = "codex"
dest_root = ".codex/agents"
dest_pattern = "{stem}.toml"
transforms = ["runtime_substitute", "agent_md_to_toml"]
owns_tree = true

# Hooks: byte-identical in both runtimes.
[[outputs]]
source = "hooks"
runtime = "claude"
dest_root = ".claude/hooks"
dest_pattern = "{name}"
transforms = []
owns_tree = true

[[outputs]]
source = "hooks"
runtime = "codex"
dest_root = ".codex/hooks"
dest_pattern = "{name}"
transforms = []
owns_tree = true

# Rules: Claude-only (targets = ["claude"]). Byte-identical verbatim copy of the
# canonical path-policy rules. No Codex output.
[[outputs]]
source = "rules"
runtime = "claude"
dest_root = ".claude/rules"
dest_pattern = "{name}"
transforms = []
owns_tree = true

# Nested instructions: byte-identical sibling adapters per directory. Sources are
# runtime-neutral, so each CLAUDE.md and AGENTS.md sibling are identical.
[[outputs]]
source = "nested-src"
runtime = "claude"
dest_file = "src/CLAUDE.md"
transforms = []
owns_tree = false

[[outputs]]
source = "nested-src"
runtime = "codex"
dest_file = "src/AGENTS.md"
transforms = []
owns_tree = false

[[outputs]]
source = "nested-design"
runtime = "claude"
dest_file = "design/CLAUDE.md"
transforms = []
owns_tree = false

[[outputs]]
source = "nested-design"
runtime = "codex"
dest_file = "design/AGENTS.md"
transforms = []
owns_tree = false

[[outputs]]
source = "nested-docs"
runtime = "claude"
dest_file = "docs/CLAUDE.md"
transforms = []
owns_tree = false

[[outputs]]
source = "nested-docs"
runtime = "codex"
dest_file = "docs/AGENTS.md"
transforms = []
owns_tree = false

# Root instructions: byte-identical in both runtimes.
[[outputs]]
source = "root-instructions"
runtime = "claude"
dest_file = "CLAUDE.md"
transforms = []
owns_tree = false

[[outputs]]
source = "root-instructions"
runtime = "codex"
dest_file = "AGENTS.md"
transforms = []
owns_tree = false
