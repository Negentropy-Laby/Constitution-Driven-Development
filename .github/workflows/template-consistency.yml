name: Template Consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  consistency:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Skill lint self-test
        run: python scripts/skill_lint.py --self-test

      - name: All skill strict lint
        run: python scripts/skill_lint.py --strict .claude/skills

      - name: Codex skill strict lint
        run: python scripts/skill_lint.py --strict .agents/skills

      - name: Workflow/catalog/docs/examples boundary consistency
        run: python scripts/workflow_consistency.py
