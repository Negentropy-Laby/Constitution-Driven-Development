name: Runtime Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CLAUDE_CODE_VERSION: "2.1.207"
  CODEX_CLI_VERSION: "0.144.1"
  RESULT_SCHEMA: "${{ github.workspace }}/tests/fixtures/runtime-smoke/result.schema.json"

jobs:
  claude:
    name: Claude Code live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
      DISABLE_AUTOUPDATER: "1"
      FIXTURE: "${{ runner.temp }}/cdd-claude-smoke"
      EVIDENCE: "${{ runner.temp }}/cdd-claude-evidence"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Require Anthropic credential
        shell: bash
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY Actions secret is required"
            exit 1
          fi

      - name: Install pinned Claude Code
        run: npm install --global "@anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }}"

      - name: Prepare read-only fixture
        shell: bash
        run: |
          mkdir -p "$EVIDENCE"
          python scripts/runtime_smoke.py --structural | tee "$EVIDENCE/structural-smoke.txt"
          python scripts/runtime_smoke.py --prepare-fixture "$FIXTURE" --runtime claude
          git init -q "$FIXTURE"
          git -C "$FIXTURE" add .
          git -C "$FIXTURE" -c user.name=runtime-smoke -c user.email=runtime-smoke@example.invalid commit -qm baseline
          claude --version | tee "$EVIDENCE/claude-version.txt"

      - name: Run CDD skills through Claude Code
        shell: bash
        run: |
          set -euo pipefail
          run_smoke() {
            logical_command="$1"
            invocation="$2"
            output="$EVIDENCE/${logical_command}.json"
            prompt="${invocation}
          This is a release smoke test. Explicitly load and follow the named CDD skill.
          Remain read-only. For constitute, perform stage detection and stop before
          the first user decision or write. For help, report the catalog-driven next
          step. For cdd-status, honor --dry-run and draft status without writing.
          Return only the JSON object required by the supplied schema. Set command
          to ${logical_command}, skill_loaded to true only if the project skill was
          loaded, write_attempted to false, and cite concrete repository evidence."
            (
              cd "$FIXTURE"
              claude -p "$prompt" \
                --setting-sources project \
                --tools "Read,Glob,Grep" \
                --permission-mode dontAsk \
                --no-session-persistence \
                --max-budget-usd 1.00 \
                --output-format json \
                --json-schema "$(cat "$RESULT_SCHEMA")"
            ) > "$output"
            python "$GITHUB_WORKSPACE/scripts/runtime_smoke.py" \
              --validate-result "$output" --command "$logical_command"
            if [ -n "$(git -C "$FIXTURE" status --porcelain)" ]; then
              echo "::error::Claude smoke mutated the fixture during $logical_command"
              git -C "$FIXTURE" status --short
              exit 1
            fi
          }
          run_smoke constitute "/constitute"
          run_smoke help "/help"
          run_smoke cdd-status "/cdd-status --dry-run"

      - name: Upload Claude evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-claude
          path: |
            ${{ runner.temp }}/cdd-claude-evidence/*-version.txt
            ${{ runner.temp }}/cdd-claude-evidence/structural-smoke.txt
            ${{ runner.temp }}/cdd-claude-evidence/*.json
          if-no-files-found: warn
          retention-days: 30

  codex:
    name: Codex live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"
      FIXTURE: "${{ runner.temp }}/cdd-codex-smoke"
      EVIDENCE: "${{ runner.temp }}/cdd-codex-evidence"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Require OpenAI credential
        shell: bash
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY Actions secret is required"
            exit 1
          fi

      - name: Install pinned Codex CLI
        run: npm install --global "@openai/codex@${{ env.CODEX_CLI_VERSION }}"

      - name: Prepare read-only fixture
        shell: bash
        run: |
          mkdir -p "$EVIDENCE"
          python scripts/runtime_smoke.py --structural | tee "$EVIDENCE/structural-smoke.txt"
          python scripts/runtime_smoke.py --prepare-fixture "$FIXTURE" --runtime codex
          git init -q "$FIXTURE"
          git -C "$FIXTURE" add .
          git -C "$FIXTURE" -c user.name=runtime-smoke -c user.email=runtime-smoke@example.invalid commit -qm baseline
          codex --version | tee "$EVIDENCE/codex-version.txt"

      - name: Run CDD skills through Codex
        shell: bash
        run: |
          set -euo pipefail
          run_smoke() {
            logical_command="$1"
            invocation="$2"
            output="$EVIDENCE/${logical_command}.json"
            prompt="${invocation}
          This is a release smoke test. Explicitly load and follow the named CDD skill.
          Remain read-only. For constitute, perform stage detection and stop before
          the first user decision or write. For help, report the catalog-driven next
          step. For cdd-status, honor --dry-run and draft status without writing.
          Return only the JSON object required by the supplied schema. Set command
          to ${logical_command}, skill_loaded to true only if the project skill was
          loaded, write_attempted to false, and cite concrete repository evidence."
            codex --ask-for-approval never exec \
              --ephemeral \
              --ignore-user-config \
              --disable hooks \
              --sandbox read-only \
              --cd "$FIXTURE" \
              --output-schema "$RESULT_SCHEMA" \
              --output-last-message "$output" \
              "$prompt"
            python "$GITHUB_WORKSPACE/scripts/runtime_smoke.py" \
              --validate-result "$output" --command "$logical_command"
            if [ -n "$(git -C "$FIXTURE" status --porcelain)" ]; then
              echo "::error::Codex smoke mutated the fixture during $logical_command"
              git -C "$FIXTURE" status --short
              exit 1
            fi
          }
          run_smoke constitute '$constitute'
          run_smoke help '$help'
          run_smoke cdd-status '$cdd-status --dry-run'

      - name: Upload Codex evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-codex
          path: |
            ${{ runner.temp }}/cdd-codex-evidence/*-version.txt
            ${{ runner.temp }}/cdd-codex-evidence/structural-smoke.txt
            ${{ runner.temp }}/cdd-codex-evidence/*.json
          if-no-files-found: warn
          retention-days: 30
