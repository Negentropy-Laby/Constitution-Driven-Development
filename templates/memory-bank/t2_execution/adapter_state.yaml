# Adapter generation freshness state.
#
# Lifecycle:
#   - /constitute initializes this exact deterministic template as uninitialized.
#   - /constitute-check runs the state JSON check, reports the live result, and
#     records fresh or stale values only after explicit approval.
#   - /cdd-status reads this recorded state but never recomputes or owns it.
#   - scripts/sync_adapters.py is read-only and never writes here.
#
# Digests are deterministic:
#   manifest_digest = sha256(cdd-manifest.toml bytes)
#   source_digest   = sha256 over sorted, length-framed canonical POSIX paths and
#                     their length-framed exact file bytes
#   checked_at      = ISO-8601 UTC, set on an approved /constitute-check update
#
# Template values are intentionally uninitialized — do not fabricate live state.

schema_version: 1
status: uninitialized            # uninitialized | fresh | stale
manifest_version: 2
manifest_digest: ""
source_digest: ""
checked_commit: ""
checked_at: ""
check_command: "python scripts/sync_adapters.py --check"
